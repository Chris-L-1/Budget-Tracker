<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budget Tracker</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet">
  </head>
  <body>

    <header class="nav-container">
      <nav class="nav">
        <h1 class="logo">Budgetly</h1>
        <button id="theme-toggle" aria-label="Switch to dark mode"
          class="toggle">🌙</button>
      </nav>
    </header>

    <main aria-label="Budget Tracker Application">

      <section class="summary">

        <h2 class="sr-only">Financial Summary</h2>

        <div class="cards-wrapper">
          <div id="income">
            <span>
              💰
            </span>
            <h3>Total Income</h3>
            <p id="income-amount">R 0.00</p>
          </div>

          <div id="total-expense">
            <span>
              💸
            </span>
            <h3>Total Expense</h3>
            <p id="expense-amount">R 0.00</p>
          </div>

          <div id="balance">
            <span>
              📊
            </span>
            <h3>Balance</h3>
            <p id="balance-amount">R 0.00</p>
          </div>

        </div>
      </section>

      <section class="dashboard">
        <div class="dashboard-wrapper">

          <div class="add-transaction">

            <h2>Add Transaction</h2>

            <form id="transaction-form">

              <div class="form-group">
                <label for="description">Description</label>
                <input type="text" id="description" name="description" required>
              </div>

              <div class="form-group">
                <label for="amount">Amount</label>
                <input type="number" name="amount" id="amount" required>
              </div>

              <div class="form-group">
                <label for="type">Income/Expense</label>
                <select name="type" id="type" required>
                  <option value="income">Income</option>
                  <option value="expense">Expense</option>
                </select>
              </div>

              <div class="form-group">
                <label for="category">Category</label>
                <select name="category" id="category">
                  <!-- JavaScript will populate these options dynamically -->
                </select>
              </div>

              <!-- Button to submit -->
              <button class="transaction-form button" type="submit">Add
                Transaction</button>

            </form>
          </div>

          <div class="transaction-history">

            <h2>Transaction History</h2>

            <div class="filter-group">
              <label for="filter">Filter</label>
              <select name="filter" id="filter">
                <option value="all">All</option>
                <option value="housing-and-rent">Housing & Rent</option>
                <option value="healthcare">Healthcare</option>
                <option value="food-and-groceries">Food & Groceries</option>
                <option value="transport">Transport</option>
                <option value="education">Education</option>
                <option value="shopping">Shopping</option>
                <option value="utilities">Utilities</option>
                <option value="salary">Salary</option>
                <option value="freelance">Freelance</option>
                <option value="other">Other</option>
              </select>
            </div>

            <ul id="transaction-list"></ul>

          </div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <p>&copy;2026 Budgetly | Built by Chris Lufuilu | <a
          href="https://github.com/Chris-L-1"
          target="_blank"
          aria-label="Visit Chris Lufuilu's GitHub profile">GitHub</a></p>
    </footer>

    <script src="script.js"></script>

  </body>
</html>
